name: Create Environment

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Name for the new environment
        required: true
      env_type:
        description: Environment type (dev/staging/test)
        required: true
        default: dev
      ttl_days:
        description: Days until environment expires
        required: true
        default: "7"
      reason:
        description: Reason for creating this environment
        required: true
      port_context:
        description: Port context
        required: false

env:
  NAMESPACE: walmart-demo-${{ github.event.inputs.environment_name }}

jobs:
  create-environment:
    name: Create Environment
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Calculate expiry date
        id: expiry
        run: |
          TTL="${{ github.event.inputs.ttl_days }}"
          TTL="${TTL:-7}"
          EXPIRY=$(date -d "+${TTL} days" -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPIRY_DATE=$(date -d "+${TTL} days" -u +"%Y-%m-%d")
          echo "date=$EXPIRY" >> $GITHUB_OUTPUT
          echo "date_label=$EXPIRY_DATE" >> $GITHUB_OUTPUT

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          ACTOR=$(echo "${{ github.actor }}" | sed 's/\[bot\]/bot/g' | tr -cd 'A-Za-z0-9._-' | sed 's/^[-.]//;s/[-.]$//')
          kubectl label namespace ${{ env.NAMESPACE }} \
            environment=${{ github.event.inputs.env_type }} \
            managed-by=port \
            created-by="${ACTOR}" \
            expires=${{ steps.expiry.outputs.date_label }} \
            --overwrite
          echo "✅ Namespace ${{ env.NAMESPACE }} created"

      - name: Wait for Port to sync namespace
        run: |
          TOKEN=$(curl -s -X POST https://api.port.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d '{"clientId":"${{ secrets.PORT_CLIENT_ID }}","clientSecret":"${{ secrets.PORT_CLIENT_SECRET }}"}' \
            | jq -r '.accessToken')
          NS_ID="${{ env.NAMESPACE }}-walmart-demo"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.port.io/v1/blueprints/k8s_namespace/entities/${NS_ID}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Namespace entity synced"
              exit 0
            fi
            echo "Waiting for Port to sync namespace... ($i/18, ${STATUS})"
            sleep 10
          done
          echo "⚠️ Namespace entity not synced after 3 minutes, continuing anyway"

      - name: Notify Port - create environment entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          identifier: ${{ github.event.inputs.environment_name }}
          title: "${{ github.event.inputs.environment_name }}"
          blueprint: environment
          properties: |
            {
              "env_type": "${{ github.event.inputs.env_type }}",
              "status": "Active",
              "expires_at": "${{ steps.expiry.outputs.date }}",
              "created_by": "${{ github.actor }}",
              "cloud_provider": "local-k3s"
            }
          relations: |
            {
              "k8s_cluster": "walmart-demo",
              "k8s_namespace": "${{ env.NAMESPACE }}-walmart-demo"
            }

      - name: Update Port run status
        uses: port-labs/port-github-action@v1
        if: always()
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: ${{ job.status == 'success' && 'SUCCESS' || 'FAILURE' }}
          logMessage: |
            Environment created
            Name: ${{ github.event.inputs.environment_name }}
            Type: ${{ github.event.inputs.env_type }}
            Namespace: ${{ env.NAMESPACE }}
            Expires: ${{ steps.expiry.outputs.date_label }}
