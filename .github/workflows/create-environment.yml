name: Create Environment

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Name for the new environment
        required: true
      env_type:
        description: Environment type (dev/staging/test)
        required: true
        default: dev
      ttl_days:
        description: Days until environment expires
        required: true
        default: "7"
      reason:
        description: Reason for creating this environment
        required: true
      port_context:
        description: Port context
        required: false

env:
  NAMESPACE: walmart-demo-${{ github.event.inputs.environment_name }}

jobs:
  create-environment:
    name: Create Environment
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Calculate expiry date
        id: expiry
        run: |
          EXPIRY=$(date -d "+${{ github.event.inputs.ttl_days }} days" -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "date=$EXPIRY" >> $GITHUB_OUTPUT

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          ACTOR=$(echo "${{ github.actor }}" | sed 's/\[bot\]/bot/g' | tr -cd 'A-Za-z0-9._-' | sed 's/^[-.]//;s/[-.]$//')
          kubectl label namespace ${{ env.NAMESPACE }} \
            environment=${{ github.event.inputs.env_type }} \
            managed-by=port \
            created-by="${ACTOR}" \
            expires=${{ steps.expiry.outputs.date }} \
            --overwrite
          echo "✅ Namespace ${{ env.NAMESPACE }} created"

      - name: Calculate NodePort
        id: nodeport
        run: |
          # Hash the environment name to a port in range 30086-30090
          HASH=$(echo -n "${{ github.event.inputs.environment_name }}" | cksum | cut -d' ' -f1)
          PORT=$((30086 + ($HASH % 5)))
          echo "port=$PORT" >> $GITHUB_OUTPUT

      - name: Deploy sample workload
        run: |
          kubectl apply -n ${{ env.NAMESPACE }} -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: demo-service
            namespace: ${{ env.NAMESPACE }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: demo-service
            template:
              metadata:
                labels:
                  app: demo-service
              spec:
                containers:
                  - name: demo-service
                    image: ghcr.io/${{ github.repository }}:latest
                    ports:
                      - containerPort: 8080
                    env:
                      - name: SERVICE_NAME
                        value: "demo-service"
                      - name: HEALTH_STATUS
                        value: "healthy"
                      - name: VERSION
                        value: "latest"
                      - name: PORT
                        value: "8080"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: demo-service
            namespace: ${{ env.NAMESPACE }}
          spec:
            selector:
              app: demo-service
            type: NodePort
            ports:
              - port: 80
                targetPort: 8080
                nodePort: ${{ steps.nodeport.outputs.port }}
          EOF

      - name: Wait for rollout
        run: kubectl rollout status deployment/demo-service -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Get environment URL
        id: url
        run: |
          echo "url=http://${{ secrets.NODE_IP }}:${{ steps.nodeport.outputs.port }}" >> $GITHUB_OUTPUT
          echo "Environment URL: http://${{ secrets.NODE_IP }}:${{ steps.nodeport.outputs.port }}"

      - name: Notify Port - create environment entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          identifier: ${{ github.event.inputs.environment_name }}
          title: "${{ github.event.inputs.environment_name }}"
          blueprint: environment
          properties: |
            {
              "env_type": "${{ github.event.inputs.env_type }}",
              "status": "Active",
              "url": "${{ steps.url.outputs.url }}",
              "expires_at": "${{ steps.expiry.outputs.date }}",
              "created_by": "${{ github.actor }}",
              "cloud_provider": "local-k3s"
            }

      - name: Update Port run status
        uses: port-labs/port-github-action@v1
        if: always()
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: ${{ job.status }}
          logMessage: |
            Environment creation completed
            Name: ${{ github.event.inputs.environment_name }}
            Type: ${{ github.event.inputs.env_type }}
            URL: ${{ steps.url.outputs.url }}
